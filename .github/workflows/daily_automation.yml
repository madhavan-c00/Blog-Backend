name: Daily Job & Reel Automation

on:
  schedule:
    - cron: '30 2 * * *'  # 08:00 AM IST - Scrape & Batch
    - cron: '30 4 * * *'  # 10:00 AM IST - Process Batch 1
    - cron: '30 8 * * *'  # 02:00 PM IST - Process Batch 2
    - cron: '30 11 * * *' # 05:00 PM IST - Process Batch 3
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch to run (scrape, batch_1, batch_2, batch_3)'
        required: true
        default: 'scrape'

jobs:
  automate:
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Opt into Node 24 for future-proofing
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using Node 22 for stability and avoiding deprecation
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Automation Phase
        run: |
          HOUR=$(date +%H)
          PHASE="${{ github.event.inputs.batch }}"
          
          if [ -z "$PHASE" ]; then
            if [ "$HOUR" == "02" ]; then PHASE="scrape";
            elif [ "$HOUR" == "04" ]; then PHASE="batch_1";
            elif [ "$HOUR" == "08" ]; then PHASE="batch_2";
            elif [ "$HOUR" == "11" ]; then PHASE="batch_3";
            else PHASE="scrape"; fi
          fi
          
          echo "🚀 Running Phase: $PHASE"
          
          if [ "$PHASE" == "scrape" ]; then
            node scrapeAndBatch.js
          else
            node processBatch.js "$PHASE"
            node processBatchReels.js "$PHASE"
          fi
