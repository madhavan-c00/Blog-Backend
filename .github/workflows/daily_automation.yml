name: Daily Job & Reel Automation

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 AM IST - Scrape & Batch
    - cron: '30 4 * * *'   # 10:00 AM IST - Process Batch 1
    - cron: '30 8 * * *'   # 02:00 PM IST - Process Batch 2
    - cron: '30 11 * * *'  # 05:00 PM IST - Process Batch 3
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch to run (scrape, batch_1, batch_2, batch_3)'
        required: true
        default: 'scrape'

jobs:
  automate:
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BACKGROUND_VIDEO_URL: ${{ secrets.BACKGROUND_VIDEO_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Automation Phase
        run: |
          # ✅ Use github.event.schedule for reliable phase detection (not fragile HOUR matching)
          PHASE="${{ github.event.inputs.batch }}"
          SCHEDULE="${{ github.event.schedule }}"

          if [ -z "$PHASE" ]; then
            if   [ "$SCHEDULE" == "30 2 * * *"  ]; then PHASE="scrape";
            elif [ "$SCHEDULE" == "30 4 * * *"  ]; then PHASE="batch_1";
            elif [ "$SCHEDULE" == "30 8 * * *"  ]; then PHASE="batch_2";
            elif [ "$SCHEDULE" == "30 11 * * *" ]; then PHASE="batch_3";
            else
              echo "❌ ERROR: Could not determine phase. Schedule='$SCHEDULE'. Aborting."
              exit 1
            fi
          fi

          echo "🚀 Running Phase: $PHASE"

          if [ "$PHASE" == "scrape" ]; then
            node scrapeAndBatch.js
          elif [ "$PHASE" == "batch_1" ] || [ "$PHASE" == "batch_2" ] || [ "$PHASE" == "batch_3" ]; then
            node processBatch.js "$PHASE"
            node processBatchReels.js "$PHASE"
          else
            echo "❌ ERROR: Unknown phase '$PHASE'. Valid: scrape, batch_1, batch_2, batch_3"
            exit 1
          fi
